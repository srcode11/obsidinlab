<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Obsidian Lab · سريع. دقيق. منتهي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Thamaneh:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="language-switcher">
    <button class="lang-btn active" data-lang="ar">عربي</button>
    <span class="lang-divider">|</span>
    <button class="lang-btn" data-lang="en">English</button>
  </div>

  <div class="container">
    <div class="brand">
      <div class="brand-text">Obsidian Lab</div>
    </div>

    <div class="hero">
      <div class="lightning-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 data-lang-ar="ننجزها. بسرعة." data-lang-en="We get it done. Fast.">ننجزها بسرعة.</h1>
      <p class="hero-sub" data-lang-ar="مشاريع، واجبات، تقارير، وعروض تقديمية تُنجز لك" data-lang-en="Projects, assignments, reports, and presentations handled for you">مشاريع، واجبات، تقارير، وعروض تقديمية تُنجز لك</p>
      <a href="#" class="btn-primary" id="heroWhatsAppBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span data-lang-ar="اطلب عبر الواتساب" data-lang-en="Order via WhatsApp">اطلب عبر الواتساب</span>
      </a>
    </div>

    <div class="services-section">
      <div class="section-title">
        <span class="title-accent">ـ</span>
        <span data-lang-ar="الباقات" data-lang-en="Packages">الباقات</span>
      </div>
      <div class="cards-grid" id="packagesGrid"></div>
    </div>

    <div class="footer">
      <div class="brand-line">Obsidian Lab – <span data-lang-ar="سريع. دقيق. منتهي" data-lang-en="Fast. Precise. Done.">سريع. دقيق. منتهي</span></div>
      <a href="#" class="whatsapp-footer-btn" id="footerWhatsAppBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span data-lang-ar="محادثة واتساب" data-lang-en="Chat on WhatsApp">محادثة واتساب</span>
      </a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
